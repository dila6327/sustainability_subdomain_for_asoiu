<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses on Sustainability</title>
    <style>

/* TITLE */
h1.title {
    text-align: center;
    margin-top: 30px;
}

p.text {
    text-align: center;
    color: #555;
}

/* FILTER BUTTONS */
.filter-container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    margin: 30px 20px;
}

.filter-btn {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #1a4d57;
    color: white;
    font-weight: 500;
    transition: 0.3s;
}

.filter-btn:hover,
.filter-btn.active {
    background: #ffc107;
    color: black;
}

/* GRID */
.health-section-container {
    width: 100%;
    margin-top: 20px;
}

.health-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.course-card {
    background: #1a4d57;
    border-radius: 12px;
    padding: 25px;
    color: white;
    transition: 0.3s;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 250px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    animation: fadeIn 0.4s ease;
}

.course-card:hover {
    transform: translateY(-5px);
    background: #235d68;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* CARD CONTENT */
.card-meta {
    font-size: 12px;
    font-weight: 700;
    color: #ffc107;
    margin-bottom: 10px;
}

.health-card h3 {
    font-size: 18px;
    margin-bottom: 10px;
}

.health-card p {
    font-size: 14px;
    color: #cfd8dc;
    margin-bottom: 10px;
}

.learn-more-link {
    color: #ffc107;
    text-decoration: none;
    margin-top: 10px;
    font-weight: 600;
}

.learn-more-link:hover {
    text-decoration: underline;
}

/* RESPONSIVE STYLES */
@media (max-width: 768px) {
    h1.title {
        font-size: 28px;
        margin-top: 20px;
    }

    p.text {
        font-size: 15px;
    }

    .filter-container {
        margin: 20px 10px;
        gap: 8px;
    }

    .filter-btn {
        padding: 8px 14px;
        font-size: 13px;
    }

    .health-grid {
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        padding: 15px;
        gap: 15px;
    }

    .health-card {
        padding: 20px;
        min-height: 220px;
    }

    .health-card h3 {
        font-size: 16px;
    }

    .health-card p {
        font-size: 13px;
    }

    .card-meta {
        font-size: 11px;
    }
}

@media (max-width: 576px) {
    h1.title {
        font-size: 22px;
        margin-top: 15px;
        margin-bottom: 15px;
    }

    p.text {
        font-size: 13px;
        margin-bottom: 15px;
    }

    .filter-container {
        margin: 15px 5px;
        gap: 6px;
        flex-direction: column;
    }

    .filter-btn {
        padding: 10px 12px;
        font-size: 12px;
        width: 100%;
    }

    .health-grid {
        grid-template-columns: 1fr;
        padding: 10px;
        gap: 12px;
    }

    .health-card {
        padding: 18px;
        min-height: 200px;
    }

    .health-card h3 {
        font-size: 15px;
        margin-bottom: 8px;
    }

    .health-card p {
        font-size: 12px;
    }

    .card-meta {
        font-size: 10px;
        margin-bottom: 8px;
    }

    .learn-more-link {
        font-size: 12px;
        margin-top: 8px;
    }
}

</style>
</head>
<body>
    

</head>

<body>

<h1 class="qs-sustainability-heading">Courses on Sustainability</h1>


<div class="filter-container">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="asoiu-bachelor">ASOIU Bachelor</button>
    <button class="filter-btn" data-type="asoiu-master">ASOIU Master</button>
    <button class="filter-btn" data-type="ufaz-bachelor">UFAZ Bachelor</button>
    <button class="filter-btn" data-type="ufaz-master">UFAZ Master</button>
</div>

<div class="health-section-container">
    <div class="health-grid" id="coursesContainer"></div>
</div>
</body>
</html>
